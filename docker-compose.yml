version: '3.8'

services:
  db:
    image: pgvector/pgvector:16
    restart: always
    environment:
      POSTGRES_USER: ai_cfo
      POSTGRES_PASSWORD: ai_cfo_password
      POSTGRES_DB: ai_cfo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount supabase migrations to auto-initialize the database
      - ./supabase/migrations:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://ai_cfo:ai_cfo_password@db:5432/ai_cfo_db
    depends_on:
      - db
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
